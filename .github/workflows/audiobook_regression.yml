name: Audiobook regression
concurrency:
  group: audiobook-regression-${{ github.ref }}
  cancel-in-progress: false

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/audiobook_script/**'
      - 'config/audiobook_script/**'
      - 'prompts/audiobook/**'
      - 'schemas/comparator_result_v2.schema.json'
      - '.github/workflows/audiobook_*.yml'
  workflow_dispatch:
    inputs:
      full_golden:
        description: 'Run full golden regression (slow). Default false runs smoke probe.'
        required: false
        default: false
        type: boolean
      locale:
        description: 'Locale shard for full golden run (use all for full matrix)'
        required: false
        default: all
        type: choice
        options: [all, zh-TW, zh-HK, zh-SG, zh-CN, ja-JP, ko-KR]

jobs:
  schema-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema
      - name: Validate comparator assets
        run: |
          python - <<'PY'
          import json, yaml
          from pathlib import Path
          root = Path('.')
          required = [
            root/'config/audiobook_script/comparator_config.yaml',
            root/'config/audiobook_script/comparison_checklist_v2.yaml',
            root/'config/audiobook_script/static_polish_rubric.yaml',
            root/'schemas/comparator_result_v2.schema.json',
            root/'prompts/audiobook/judge_audiobook_v2.txt',
          ]
          for p in required:
            if not p.exists():
              raise SystemExit(f"Missing required file: {p}")
          yaml.safe_load((root/'config/audiobook_script/comparator_config.yaml').read_text())
          yaml.safe_load((root/'config/audiobook_script/comparison_checklist_v2.yaml').read_text())
          yaml.safe_load((root/'config/audiobook_script/static_polish_rubric.yaml').read_text())
          json.loads((root/'schemas/comparator_result_v2.schema.json').read_text())
          print('Comparator asset validation passed')
          PY

  golden-regression:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 45
    needs: [schema-and-config]
    env:
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema openai requests
      - name: Preflight runner + LM health
        run: |
          set -euo pipefail
          echo "== LM Studio model check =="
          curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
          cat /tmp/models.json | head -c 400; echo
          echo "== LM Studio warmup call =="
          curl -fsS --max-time 45 "$QWEN_BASE_URL/chat/completions" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $QWEN_API_KEY" \
            -d "{\"model\":\"$QWEN_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":8,\"temperature\":0.0}" >/tmp/warmup.json
          python3 - <<'PY'
          import json
          p = "/tmp/warmup.json"
          data = json.load(open(p))
          if "error" in data:
            raise SystemExit(f"Warmup failed: {data['error']}")
          print("warmup_ok=true")
          PY
          echo "== Memory check =="
          FREE_PAGES=$(vm_stat | awk '/Pages free/ {gsub("\\.","",$3); print $3}')
          INACTIVE_PAGES=$(vm_stat | awk '/Pages inactive/ {gsub("\\.","",$3); print $3}')
          FREE_BYTES=$(( (FREE_PAGES + INACTIVE_PAGES) * 4096 ))
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_BYTES"]) / (1024**3)
          print(f"free_mem_gb={free_gb:.2f}")
          if free_gb < 2.0:
            raise SystemExit("Insufficient free memory for stable regression run (<2.0 GB).")
          PY
          echo "== Disk check =="
          FREE_KB=$(df -k . | awk 'NR==2{print $4}')
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_KB"]) / (1024**2)
          print(f"free_disk_gb={free_gb:.2f}")
          if free_gb < 10.0:
            raise SystemExit("Insufficient free disk for artifacts (<10 GB).")
          PY
      - name: Run dry-run validation
        run: |
          caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --dry-run --verbose
      - name: Run smoke regression (fast gate)
        run: |
          caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --smoke --verbose
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_regression_report_smoke
          path: artifacts/audiobook/regression_report.json
          retention-days: 14

  full-golden-single-locale:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_golden == true && inputs.locale != 'all' }}
    runs-on: self-hosted
    timeout-minutes: 45
    needs: [schema-and-config]
    env:
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema openai requests
      - name: Preflight LM warmup
        run: |
          set -euo pipefail
          curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
          curl -fsS --max-time 45 "$QWEN_BASE_URL/chat/completions" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $QWEN_API_KEY" \
            -d "{\"model\":\"$QWEN_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":8,\"temperature\":0.0}" >/tmp/warmup.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/warmup.json"))
          if "error" in data:
            raise SystemExit(f"Warmup failed: {data['error']}")
          print("warmup_ok=true")
          PY
      - name: Run full golden regression (single locale)
        run: |
          echo "[full-golden] locale=${{ inputs.locale }}"
          for attempt in 1 2; do
            echo "attempt=${attempt}"
            caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --locale "${{ inputs.locale }}" --verbose && exit 0
            if [ "$attempt" -eq 2 ]; then
              echo "full-golden single-locale failed after retry"
              exit 1
            fi
            sleep 15
          done
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_regression_report_${{ inputs.locale }}
          path: artifacts/audiobook/regression_report.json
          retention-days: 14

  full-golden-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_golden == true && inputs.locale == 'all' }}
    runs-on: self-hosted
    timeout-minutes: 45
    needs: [schema-and-config]
    strategy:
      fail-fast: false
      matrix:
        locale: [zh-TW, zh-HK, zh-SG, zh-CN, ja-JP, ko-KR]
    env:
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema openai requests
      - name: Preflight LM warmup
        run: |
          set -euo pipefail
          curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
          curl -fsS --max-time 45 "$QWEN_BASE_URL/chat/completions" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $QWEN_API_KEY" \
            -d "{\"model\":\"$QWEN_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":8,\"temperature\":0.0}" >/tmp/warmup.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/warmup.json"))
          if "error" in data:
            raise SystemExit(f"Warmup failed: {data['error']}")
          print("warmup_ok=true")
          PY
      - name: Run full golden regression shard
        run: |
          echo "[matrix shard] locale=${{ matrix.locale }}"
          for attempt in 1 2; do
            echo "attempt=${attempt}"
            caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --locale "${{ matrix.locale }}" --verbose && exit 0
            if [ "$attempt" -eq 2 ]; then
              echo "matrix shard failed after retry locale=${{ matrix.locale }}"
              exit 1
            fi
            sleep 15
          done
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_regression_report_${{ matrix.locale }}
          path: artifacts/audiobook/regression_report.json
          retention-days: 14
