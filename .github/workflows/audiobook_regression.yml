name: Audiobook regression
concurrency:
  group: audiobook-regression-${{ github.ref }}
  cancel-in-progress: false

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/audiobook_script/**'
      - 'config/audiobook_script/**'
      - 'prompts/audiobook/**'
      - 'schemas/comparator_result_v2.schema.json'
      - '.github/workflows/audiobook_*.yml'
  workflow_dispatch:
    inputs:
      full_golden:
        description: 'Run full golden regression (slow). Default false runs smoke probe.'
        required: false
        default: false
        type: boolean

jobs:
  schema-and-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema
      - name: Validate comparator assets
        run: |
          python - <<'PY'
          import json, yaml
          from pathlib import Path
          root = Path('.')
          required = [
            root/'config/audiobook_script/comparator_config.yaml',
            root/'config/audiobook_script/comparison_checklist_v2.yaml',
            root/'config/audiobook_script/static_polish_rubric.yaml',
            root/'schemas/comparator_result_v2.schema.json',
            root/'prompts/audiobook/judge_audiobook_v2.txt',
          ]
          for p in required:
            if not p.exists():
              raise SystemExit(f"Missing required file: {p}")
          yaml.safe_load((root/'config/audiobook_script/comparator_config.yaml').read_text())
          yaml.safe_load((root/'config/audiobook_script/comparison_checklist_v2.yaml').read_text())
          yaml.safe_load((root/'config/audiobook_script/static_polish_rubric.yaml').read_text())
          json.loads((root/'schemas/comparator_result_v2.schema.json').read_text())
          print('Comparator asset validation passed')
          PY

  golden-regression:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    needs: [schema-and-config]
    env:
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema openai requests
      - name: Run dry-run validation
        run: |
          python3 scripts/audiobook_script/run_regression.py --dry-run --verbose
      - name: Run smoke regression (fast gate)
        run: |
          python3 scripts/audiobook_script/run_regression.py --smoke --verbose
      - name: Run full golden regression (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_golden == true }}
        run: |
          python3 scripts/audiobook_script/run_regression.py --verbose
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_regression_report
          path: artifacts/audiobook/regression_report.json
          retention-days: 14
