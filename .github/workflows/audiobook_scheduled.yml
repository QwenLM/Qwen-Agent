name: Audiobook scheduled (Qwen-only)
concurrency:
  group: audiobook-scheduled
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      locale:
        description: Locale for scheduled probe + comparator run
        required: false
        default: zh-TW
        type: choice
        options: [en-US, zh-TW, zh-HK, zh-SG, zh-CN, ja-JP, ko-KR]

jobs:
  audiobook:
    runs-on: self-hosted
    timeout-minutes: 75
    env:
      PYTHONUNBUFFERED: '1'
      # LM Studio OpenAI-compatible local endpoint
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check Python
        run: |
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml jsonschema openai requests

      - name: Preflight runner + LM health
        run: |
          set -euo pipefail
          echo "== LM Studio model check =="
          curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
          cat /tmp/models.json | head -c 400; echo
          echo "== Memory check =="
          FREE_PAGES=$(vm_stat | awk '/Pages free/ {gsub("\\.","",$3); print $3}')
          INACTIVE_PAGES=$(vm_stat | awk '/Pages inactive/ {gsub("\\.","",$3); print $3}')
          FREE_BYTES=$(( (FREE_PAGES + INACTIVE_PAGES) * 4096 ))
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_BYTES"]) / (1024**3)
          print(f"free_mem_gb={free_gb:.2f}")
          if free_gb < 2.0:
            raise SystemExit("Insufficient free memory for scheduled run (<2.0 GB).")
          PY
          echo "== Disk check =="
          FREE_KB=$(df -k . | awk 'NR==2{print $4}')
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_KB"]) / (1024**2)
          print(f"free_disk_gb={free_gb:.2f}")
          if free_gb < 10.0:
            raise SystemExit("Insufficient free disk for artifacts (<10 GB).")
          PY

      - name: Dry-run setup validation
        run: |
          caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --dry-run --verbose

      - name: Golden regression smoke (fast)
        run: |
          caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --smoke --verbose

      - name: Golden regression probe shard (single locale)
        run: |
          LOCALE_PROBE="${{ inputs.locale || 'zh-TW' }}"
          echo "[probe] locale=${LOCALE_PROBE}"
          for attempt in 1 2; do
            echo "attempt=${attempt}"
            caffeinate -dimsu python3 scripts/audiobook_script/run_regression.py --locale "$LOCALE_PROBE" --verbose && break
            if [ "$attempt" -eq 2 ]; then
              echo "probe shard failed after retry"
              exit 1
            fi
            sleep 15
          done

      - name: Create scheduled source segment
        run: |
          mkdir -p artifacts/audiobook/source/scheduled
          cat > artifacts/audiobook/source/scheduled/daily_source.txt <<'SRC'
          [HOOK] You are not late to your own life.
          [STORY] Mei stopped making eye contact in meetings because she believed every question would expose her. She called it efficiency. It was fear wearing a professional jacket.
          [TAKEAWAY] The pattern is not your identity. It is a strategy your nervous system learned.
          SRC

      - name: Autonomous comparator loop run
        run: |
          LOCALE="${{ inputs.locale || 'zh-TW' }}"
          BATCH_ID="scheduled_$(date -u +%Y%m%dT%H%M%SZ)"
          for attempt in 1 2; do
            echo "attempt=${attempt}"
            caffeinate -dimsu python3 scripts/audiobook_script/run_comparator_loop.py \
              --section-id "daily_${LOCALE//-/_}_001" \
              --locale "$LOCALE" \
              --english-source artifacts/audiobook/source/scheduled/daily_source.txt \
              --book-id "scheduled" \
              --batch-id "$BATCH_ID" \
              --content-type pearl_prime && break
            if [ "$attempt" -eq 2 ]; then
              echo "scheduled comparator run failed after retry"
              exit 1
            fi
            sleep 15
          done

      - name: Upload audiobook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audiobook_artifacts_scheduled
          path: artifacts/audiobook/
          retention-days: 14
