name: Locale max-agents run

on:
  workflow_dispatch:
    inputs:
      max_agents:
        description: 'Max parallel locale workers'
        required: false
        default: '2'
        type: string
      locale_set:
        description: 'core (6 prod locales) or all'
        required: false
        default: 'core'
        type: choice
        options:
          - core
          - all
      locales:
        description: 'Optional space-separated locales override (leave blank to use locale_set)'
        required: false
        default: ''
        type: string
      timeout_sec:
        description: 'Per-topic hard timeout in seconds'
        required: false
        default: '180'
        type: string
      topics:
        description: 'Optional space-separated topics override (default: all 7)'
        required: false
        default: ''
        type: string
      mode:
        description: 'translate+validate, translate-only, validate-only'
        required: false
        default: 'translate+validate'
        type: choice
        options:
          - translate+validate
          - translate-only
          - validate-only

jobs:
  locale-batch:
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: '1'
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml openai requests jsonschema

      - name: Run locale batches
        run: |
          MODE="${{ inputs.mode || 'translate+validate' }}"
          LOCALE_SET="${{ inputs.locale_set || 'core' }}"
          LOCALES="${{ inputs.locales || '' }}"
          MAX_AGENTS="${{ inputs.max_agents || '2' }}"
          TIMEOUT_SEC="${{ inputs.timeout_sec || '180' }}"
          TOPICS="${{ inputs.topics || '' }}"

          EXTRA=""
          if [ "$MODE" = "translate-only" ]; then
            EXTRA="--translate-only"
          elif [ "$MODE" = "validate-only" ]; then
            EXTRA="--validate-only"
          fi

          TOPIC_ARGS=""
          if [ -n "$TOPICS" ]; then
            TOPIC_ARGS="--topics $TOPICS"
          fi

          if [ -n "$LOCALES" ]; then
            # shellcheck disable=SC2086
            python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" --locales $LOCALES $TOPIC_ARGS $EXTRA
          elif [ "$LOCALE_SET" = "all" ]; then
            # shellcheck disable=SC2086
            python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" $TOPIC_ARGS $EXTRA
          else
            # shellcheck disable=SC2086
            python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" --core-locales $TOPIC_ARGS $EXTRA
          fi

      - name: Upload localization batch logs
        uses: actions/upload-artifact@v4
        with:
          name: locale_batch_logs
          path: artifacts/localization/batch_runs/
          retention-days: 14
