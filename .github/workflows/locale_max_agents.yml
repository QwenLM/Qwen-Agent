name: Locale max-agents run
concurrency:
  group: locale-max-agents
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      max_agents:
        description: 'Max parallel locale workers'
        required: false
        default: '2'
        type: string
      locale_set:
        description: 'core (6 prod locales) or all'
        required: false
        default: 'core'
        type: choice
        options:
          - core
          - all
      locales:
        description: 'Optional space-separated locales override (leave blank to use locale_set)'
        required: false
        default: ''
        type: string
      timeout_sec:
        description: 'Per-teacher hard timeout (1 LLM call ~20s, safe default 120s)'
        required: false
        default: '120'
        type: string
      topics:
        description: 'Optional space-separated topics override (default: all 7)'
        required: false
        default: ''
        type: string
      mode:
        description: 'translate+validate, translate-only, validate-only'
        required: false
        default: 'translate+validate'
        type: choice
        options:
          - translate+validate
          - translate-only
          - validate-only

jobs:
  locale-batch:
    runs-on: self-hosted
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: '1'
      QWEN_BASE_URL: http://127.0.0.1:1234/v1
      QWEN_API_KEY: lm-studio
      QWEN_MODEL: qwen3-14b
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml openai requests jsonschema

      - name: Preflight runner + LM health
        if: ${{ inputs.mode != 'validate-only' }}
        run: |
          set -euo pipefail
          echo "== LM Studio model check =="
          curl -fsS "$QWEN_BASE_URL/models" >/tmp/models.json
          cat /tmp/models.json | head -c 400; echo
          echo "== LM Studio warmup call =="
          curl -fsS --max-time 45 "$QWEN_BASE_URL/chat/completions" \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $QWEN_API_KEY" \
            -d "{\"model\":\"$QWEN_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"ok\"}],\"max_tokens\":8,\"temperature\":0.0}" >/tmp/warmup.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/warmup.json"))
          if "error" in data:
            raise SystemExit(f"Warmup failed: {data['error']}")
          print("warmup_ok=true")
          PY
          echo "== Memory check =="
          FREE_PAGES=$(vm_stat | awk '/Pages free/ {gsub("\\.","",$3); print $3}')
          INACTIVE_PAGES=$(vm_stat | awk '/Pages inactive/ {gsub("\\.","",$3); print $3}')
          FREE_BYTES=$(( (FREE_PAGES + INACTIVE_PAGES) * 4096 ))
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_BYTES"]) / (1024**3)
          print(f"free_mem_gb={free_gb:.2f}")
          if free_gb < 2.0:
            raise SystemExit("Insufficient free memory for locale batches (<2.0 GB).")
          PY
          echo "== Disk check =="
          FREE_KB=$(df -k . | awk 'NR==2{print $4}')
          python3 - <<'PY'
          import os
          free_gb = int(os.environ["FREE_KB"]) / (1024**2)
          print(f"free_disk_gb={free_gb:.2f}")
          if free_gb < 10.0:
            raise SystemExit("Insufficient free disk for artifacts (<10 GB).")
          PY

      - name: Run locale batches
        run: |
          MODE="${{ inputs.mode || 'translate+validate' }}"
          LOCALE_SET="${{ inputs.locale_set || 'core' }}"
          LOCALES="${{ inputs.locales || '' }}"
          MAX_AGENTS="${{ inputs.max_agents || '2' }}"
          TIMEOUT_SEC="${{ inputs.timeout_sec || '120' }}"
          TOPICS="${{ inputs.topics || '' }}"

          EXTRA=""
          if [ "$MODE" = "translate-only" ]; then
            EXTRA="--translate-only"
          elif [ "$MODE" = "validate-only" ]; then
            EXTRA="--validate-only"
          fi

          TOPIC_ARGS=""
          if [ -n "$TOPICS" ]; then
            TOPIC_ARGS="--topics $TOPICS"
          fi

          run_cmd() {
            if [ -n "$LOCALES" ]; then
              # shellcheck disable=SC2086
              caffeinate -dimsu python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" --locales $LOCALES $TOPIC_ARGS $EXTRA
            elif [ "$LOCALE_SET" = "all" ]; then
              # shellcheck disable=SC2086
              caffeinate -dimsu python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" $TOPIC_ARGS $EXTRA
            else
              # shellcheck disable=SC2086
              caffeinate -dimsu python3 scripts/localization/run_locale_batches.py --max-agents "$MAX_AGENTS" --timeout-sec "$TIMEOUT_SEC" --core-locales $TOPIC_ARGS $EXTRA
            fi
          }

          for attempt in 1 2; do
            echo "attempt=${attempt}"
            run_cmd && exit 0
            if [ "$attempt" -eq 2 ]; then
              echo "locale batch run failed after retry"
              exit 1
            fi
            sleep 20
          done

      - name: Upload localization batch logs
        uses: actions/upload-artifact@v4
        with:
          name: locale_batch_logs
          path: artifacts/localization/batch_runs/
          retention-days: 14
