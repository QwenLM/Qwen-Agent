  (karoshi, email) are acceptable for contemporary resonance but keep native Japanese
  for core feelings (怖い, 静か, 価値). Ensure commas and line breaks support natural
  prosody. Test for listener comprehension at 0.78+ threshold given sentence-compression
  needs for Japanese rhythm.
