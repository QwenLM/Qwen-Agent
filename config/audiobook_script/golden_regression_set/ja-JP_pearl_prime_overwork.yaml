source_text: |
  [HOOK]
  Yuki stayed at the office until nine. Every night. She told herself it was dedication.
  But one evening, sitting in the empty parking lot, she realized something: going home
  meant sitting alone. With herself. And that terrified her.

  [STORY]
  For years, Yuki had built her identity around being indispensable. She volunteered for
  every project. She answered emails at midnight. She skipped lunch to help colleagues.
  The company praised her. They promoted her. Everyone called her a model employee.
  But Yuki knew the truth. She wasn't staying late because the work demanded it. She was
  staying late because coming home meant confronting the quiet. The silence. The person
  she was when no one was watching. At home, there was no structure. No purpose. No one
  needing her. So she invented reasons to stay. Extended deadlines. Additional meetings.
  Extra revisions. Anything to fill the hours. Anything to avoid that empty apartment.
  The karoshi pattern—overwork that damages health—had wrapped itself around her need
  to feel valuable. And she couldn't see it.

  [TAKEAWAY]
  When Yuki finally sat with that fear, everything shifted. Overwork isn't always ambition.
  Sometimes it's avoidance wearing a professional mask. Sometimes it's the soul saying:
  I'm afraid to be alone with myself. The invitation here is simple: notice what you're
  running from. Notice where you hide inside busyness. Because coming home to yourself
  isn't weakness. It's the beginning of real strength.

expected_quality_notes: >
