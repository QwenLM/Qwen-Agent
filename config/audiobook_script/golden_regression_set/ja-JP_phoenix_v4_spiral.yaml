source_text: |
  [STORY]
  Takeshi was always the first to volunteer. Project lead? He'd take it. Extra shifts?
  His hand rose before anyone else. Community event? Count him in. People loved him for it.
  They needed him. And in that need, Takeshi found something he'd searched for his whole
  life: proof that he mattered. But there was a pattern underneath. Every time he said yes
  to something, he felt safer. Every time someone asked for his help, his anxiety quieted.
  If he was useful, then he couldn't be abandoned. If he was indispensable, then no one
  could leave. The math was simple. Say yes to everything. Stay so busy that there's no
  time to feel the tremor underneath. The fear that he wasn't enough without the doing.

  [PIVOT]
  One day Takeshi got sick. Really sick. Couldn't work. Couldn't volunteer. For the first
  time in months, he had to sit with not being useful. And something unexpected happened.
  People didn't leave. The projects continued without him. The community managed. And he
  was still here. Still himself. Not because of what he did, but because he existed.

  [PERMISSION]
  Takeshi learned that day that rest isn't laziness. That saying no isn't selfish.
  That his worth doesn't depend on his output. This is the permission you might need:
  You are allowed to take care of yourself. You are allowed to disappoint people. You
  are allowed to be loved for who you are, not what you produce. The spiral doesn't need
  to turn forever.

expected_quality_notes: >
