source_text: |
  [HOOK]
  How many of you have felt it—that strange moment when you wake up and realize
  you're living someone else's life, even though it's supposed to be yours?

  [STORY]
  Jimin spent the last seven years building what looked like the perfect life.
  She had the career milestone—promoted to team lead at a Seoul advertising agency.
  She had the relationship that photographed well. She had the apartment that
  photographed even better. Every Sunday, she curated a new Instagram post: coffee
  in the morning light, her boyfriend smiling, the kind of casual perfection that
  takes twenty minutes to stage. Her feed was the kind people saved. The kind they
  shared with friends and said, "That's the life I want."

  But one morning in March, Jimin woke up and couldn't remember. She lay there,
  scrolling through her own photos, and realized she couldn't point to a single
  thing she'd done in the past year just because she wanted to. Not one decision
  made for joy. Everything was calculated for visibility—for the approval she could
  measure in hearts and comments.

  That's when she understood: comparison had become her identity. The person looking
  back from the mirror wasn't Jimin anymore. It was a composite of everyone she
  thought she should be.

  [TAKEAWAY]
  Your life isn't supposed to be a performance with an invisible audience. The
  things that matter—the decisions you make, the moments you choose—they don't get
  better when they're watched. They get smaller. Start today. Do one thing this
  week because you want to. Not because it photographs well. Not because it proves
  something. Just because.

