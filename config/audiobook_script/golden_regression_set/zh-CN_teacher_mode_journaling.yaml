  Mainland standard Mandarin, contemplative and non-judgmental. Teacher voice is warm, patient, and grounded. Clear, actionable instructions. Personal pronouns invite reader participation. Examples feel authentic without being prescriptive. Validates emotions and needs without pathologizing. TTS-ready pacing with natural pauses. Encourages self-compassion throughout. Final reflection lands with gentle wisdom.
