source_text: |
  [SUMMARY] A new UNESCO report released Monday shows that 244 million children
  worldwide remain out of school, with girls in sub-Saharan Africa and South Asia
  disproportionately affected. The report calls for a 40 percent increase in
  education financing by 2030 to close the gap.

  [YOUTH IMPACT] Among young people aged 15 to 24, the out-of-school rate
  in low-income countries stands at 23 percent — nearly one in four.
  In South Asia, 68 million girls between the ages of 6 and 17 have never
  attended a single day of formal schooling. Economists at the World Bank
  estimate that each additional year of quality education increases a young
  woman's lifetime earnings by 8 to 10 percent.

  [FORWARD LOOK] The UN General Assembly will take up education financing
  at its high-level political forum in July. A binding resolution on
  education investment targets is expected to be tabled by the G20 Education
  Working Group at their April meeting in Johannesburg.

