  Singapore standard Mandarin, data-grounded and accessible. Institutional references (World Bank, ASEAN, ILO) flow naturally into narrative. No jargon-heavy sections. Warm connection between statistics and lived experience. TTS-friendly pacing and sentence structure. Respects audience intelligence while remaining emotionally engaged.
