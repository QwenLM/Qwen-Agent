# ──────────────────────────────────────────────────────────────────────────────
# ADDING A NEW CONTENT TYPE — checklist
# ──────────────────────────────────────────────────────────────────────────────
#
# 1. Add an entry to content_types above (copy closest existing type)
# 2. Create the draft prompt file (prompts/audiobook/ or pearl_news/prompts/)
# 3. Create at least 1 golden regression sample in golden_regression_set/
# 4. Run: python scripts/content_type_onboarding.py --validate <content_type>
# 5. Run: python scripts/audiobook_script/run_regression.py (if audiobook)
# 6. The weekly EI V2 cycle automatically picks up the new content type
#
# For audiobook types: add prompt_routing entry in comparator_config.yaml
# For article types: add template to pearl_news/prompts/
# ──────────────────────────────────────────────────────────────────────────────
