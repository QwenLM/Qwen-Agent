# ──────────────────────────────────────────────────────────────────────────────
# CONTENT TYPE REGISTRY — content_type_registry.yaml
# ──────────────────────────────────────────────────────────────────────────────
#
# Single source of truth for every content type in the Pearl ecosystem.
# When you add a new content type, add ONE entry here and ONE golden sample
# to config/audiobook_script/golden_regression_set/. The entire pipeline
# (draft → judge → EI V2 → weekly report → CI) picks it up automatically.
#
# Consumed by:
#   - run_comparator_loop.py         (audiobook draft → judge loop)
#   - pearl_news_article_judge.py    (Pearl News expansion quality gate)
#   - native_prompts_eval_learn.py   (EI V2 weekly eval)
#   - run_regression.py              (golden regression)
#   - content_type_onboarding.py     (new content type scaffolding)
#
# Schema version: 1.0
# ──────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"

# ─── PEARL PRIME (audiobook) content types ───────────────────────────────────

content_types:

  pearl_prime:
    display_name: "Pearl Prime (therapeutic audiobook)"
    system: pearl_prime
    pipeline: audiobook_comparator
    draft_prompt: "prompts/audiobook/draft_pearl_prime_v2.txt"
    judge_prompt: "prompts/audiobook/judge_audiobook_v2.txt"
    judge_gates: all            # all 9 gates
    locales_supported:
      - zh-TW
      - zh-HK
      - zh-SG
      - zh-CN
      - ja-JP
      - ko-KR
    golden_samples:
      - "config/audiobook_script/golden_regression_set/zh-TW_pearl_prime_intro.yaml"
    min_scored_pass_threshold: 0.75
    atom_types:
      - STORY
      - HOOK
      - SCENE
      - REFLECTION
      - EXERCISE
      - INTEGRATION
      - PIVOT
      - TAKEAWAY
      - THREAD
      - PERMISSION
