# Pearl News — teacher atoms for topic: climate
# STATUS: STARTER — atoms are placeholder approximations.
# TODO: Replace each atom with a verified teaching sourced from the teacher's actual
#       published works, talks, or doctrine files in SOURCE_OF_TRUTH/.
#       Each atom should be 30-50 words, specific enough to connect to a news event.

topic_key: climate
topic_sdg: "13"
description: "Teacher atoms for climate-related articles"

teachers:
  ahjan:
    display_name: "Ajahn Ahjan"
    tradition: "Theravada Buddhist"
    attribution: "From within the Theravada Buddhist tradition, Ajahn Ahjan teaches that"
    status: starter
    atoms:
      - >
        the destruction of forests reflects ignorance of interdependence; harming ecosystems harms ourselves.
        Recognizing this interconnection—a core Buddhist insight—transforms how we view climate action: not as sacrifice
        but as enlightened self-interest aligned with dependent origination and the precepts.
      - >
        climate grief in young people points to genuine seeing, not pathology. The Buddhist distinction between
        paralysing doubt and samvega—the urgency that precedes action—offers a framework: climate awareness becomes a catalyst
        for awakening, not despair, when held within contemplative practice.
      - >
        the Middle Way teaches consumption without excess or denial. Mindful engagement with climate choices—what we eat,
        how we travel, what we purchase—embodies the precept against harming beings across present and future generations.
      - >
        water is life itself in Buddhist teaching. Coastal communities facing rising seas and freshwater scarcity embody the precept of ahimsa—
        non-harm—made urgent. Recognizing our dependence on clean water across all beings transforms adaptation from hardship into compassionate responsibility.
      - >
        the precept against theft extends to resource extraction. When corporations drain aquifers or clearcut forests for profit, they steal from future beings.
        Buddhist economics recognizes that true wealth lies in ecosystems intact, not in goods hoarded. This reframes climate justice as spiritual practice.
      - >
        young people speaking truth about climate are practicing Right Speech, a pillar of the Eightfold Path. Their moral clarity cuts through adult denial.
        Honoring their voices honors the dharma itself—the teaching that emerges when we stop defending lies and face reality directly.
      - >
        renewable energy reflects Right Livelihood: work that does not harm. When communities transition from fossil fuels, they embody the precept of Right Action.
        Each solar panel, each wind turbine is a commitment to generate sustenance without poisoning the air others will breathe.
      - >
        the Sangha—monastic and lay community—survives or falls together. Climate refugees fleeing uninhabitable regions teach us that community bonds cross borders.
        Theravada practice asks: how do we extend metta—loving-kindness—to those displaced by our carbon choices? Compassion becomes immigration policy.
      - >
        mindfulness applied to agriculture shows how we can feed ourselves without degrading soil or exhausting water. Traditional farming in Buddhist cultures
        worked with monsoons and seasons, not against them. Regenerative farming returns wisdom that mindfulness practice also teaches: work with nature's rhythms.
      - >
        corporate responsibility arises when companies recognize karma—cause and effect—extends beyond quarterly earnings. A fossil fuel company burning carbon today
        creates suffering tomorrow. Buddhist law is older than human law: the consequences are built in. True profit means reducing harm.

  master_feung:
    display_name: "Master Feung"
    tradition: "Taoist"
    attribution: "From within the Taoist tradition, Master Feung teaches that"
    status: starter
    atoms:
      - >
        the Tao flows through all natural cycles; forcing action against natural rhythms creates imbalance.
        Industrial extraction represents forced action, violating the harmony between yin and yang. A wise society works with nature's
        regeneration, not against it, following the principle of wu wei—effortless right action.
      - >
        drought and flood are not punishment but signal that those in power have lost alignment with the Tao.
        Climate disruption is the Earth's response to actions taken in ignorance of natural law. Restoration requires leaders who listen
        to what the seasons and waters are saying.
      - >
        the five elements—earth, water, fire, metal, wood—must remain in balanced proportion in any system.
        Climate change disrupts this balance globally. A mature civilization recognizes when extraction has exceeded regeneration and acts
        with humility to restore equilibrium rather than deny decline.
      - >
        Yang overgrowth—excessive extraction, endless expansion—is unsustainable. Taoist wisdom teaches that true strength lies in knowing when to withdraw, when to repair.
        Communities adapting to climate change through restoration of wetlands and forests practice the deep yin principle: receiving and regenerating, not always forcing.
      - >
        the Daodejing teaches that water wears stone not through force but through yielding. As oceans rise and storms intensify, human resilience emerges
        from flexibility, not rigid defenses. Societies that adapt like water—shifting, flowing—will endure; those that resist will break.
      - >
        agriculture aligned with seasonal wisdom requires no chemical force. Traditional Taoist farming worked with insect cycles and soil rhythm, not against them.
        Modern food systems imposing monoculture violate wu wei. Regenerative farming returns to the Tao, yielding abundance through harmonious action.
      - >
        youth climate movements embody ziran—authentic spontaneity arising from necessity. Young people are not forcing change but responding directly to reality.
        This is the Tao in action: no ideology, no agenda, only natural response to what must be done. Adults should follow, not resist.
      - >
        the Tao creates value through emptiness. Empty soil regenerates; empty space allows wind to flow. Corporate expansion filling every gap disrupts the Tao.
        True sustainability requires restraint, leaving space for natural renewal. This is not loss but the deepest wealth the Tao knows.
      - >
        climate refugees moving across borders follow the principle of natural flow. The Tao does not recognize human borders; people, like water, find their path.
        Restricting migration through walls and fear violates cosmic principle. Wise nations guide this flow with compassion, not violence.
      - >
        renewable energy reflects the Tao by using eternal forces—sun, wind, water—rather than burning what took millions of years to form.
        Taoist technology never depletes; it works with cycles renewed daily. Energy transition is return to the ancient way of alignment with heaven's rhythm.

  sai_ma:
    display_name: "Sai Maa"
    tradition: "Vedic Hindu"
    attribution: "From within the Vedic Hindu tradition, Sai Maa teaches that"
    status: starter
    atoms:
      - >
        Brahman—the divine—pervades all creation, including forests, oceans, and atmosphere. Polluting nature is polluting divinity itself.
        Climate care becomes devotional practice, a recognition that the sacred dwells in every element, deserving protection and reverence.
      - >
        the Vedas teach that the five elements sustain all life. Disrupting their balance through climate change tears
        the fabric that holds civilization. Restoring these elements is not environmental work but spiritual duty, honoring cosmic order.
      - >
        karma operates across lifetimes and across communities. Carbon released today becomes drought for our children's children. This teaches
        intergenerational responsibility: our actions plant seeds—of abundance or suffering—that others must harvest.
      - >
        the Rigveda honors Varuna, deity of oceans and cosmic law. Rising seas and acidifying waters reveal our violations of rita—cosmic order.
        Hindu ethics demand that we honor water as sacred, restore aquatic ecosystems, and recognize ocean health as the foundation of all life.
      - >
        Ayurveda teaches that imbalances in nature produce disease in the body. Climate breakdown—the fever of the Earth—manifests in human illness.
        Healing requires restoring balance: reducing carbon emissions is medicine for both planet and civilization, inscribed in ancient wisdom.
      - >
        the Bhagavad Gita teaches that we reap what we sow. Industrial agriculture destroying soil fertility reveals this law. Sustainable farming—using crop rotation
        and natural cycles instead of pesticides—aligns with dharma and restores what extraction has taken, honoring the gift of Earth's fertility.
      - >
        Shakti—divine feminine power—manifests as the generative force of nature. Youth climate activists awakening to their power embody Shakti rising. Their energy
        is not borrowed but cosmic, responding directly to the call of Mother Earth. Supporting their leadership honors the goddess within all beings.
      - >
        Brahman dwells equally in all living beings—human and animal alike. When species vanish from climate change, we murder Brahman in them. Hindu dharma extends
        protection to all creatures. Preserving biodiversity is not optional but the foundation of righteousness, of living in harmony with ultimate truth.
      - >
        the Upanishads teach "Tat Tvam Asi"—thou art That—revealing unity beneath diversity. Climate refugees and vulnerable communities are not separate from us.
        Their suffering is our suffering. This realization makes environmental justice a spiritual imperative, not charity, rooted in non-dual truth.
      - >
        Surya, the sun deity, is the eternal power. Transitioning to solar energy honors this divine source directly. Using renewable energy aligns civilization
        with the Vedic recognition that infinite, sustainable power flows from the sun, while coal and oil represent stolen ancient wealth that must end.

  junko:
    display_name: "Junko"
    tradition: "Zen Buddhist"
    attribution: "From within the Zen Buddhist tradition, Junko teaches that"
    status: starter
    atoms:
      - >
        in planting a seed, you encounter the climate directly. Every choice—food, travel, energy—is a seed bearing fruit.
        Zen practice teaches immediate responsibility: there is no intermediary between your hand and the Earth's response. Climate action is not
        philosophy but intimate presence with consequences.
      - >
        separation between self and environment is illusion. When you see your own breath in the city's air quality,
        your hunger in soil fertility, dualism collapses. This is not metaphor but direct perception—enlightenment includes climate awareness as lived reality.
      - >
        the gateless gate opens through embodied action, not ideology. Climate responsibility means waking up to how you live
        each moment—what you consume, what you discard, how you move. This is zazen itself, meditation manifested in daily choice.
      - >
        Zen monasteries practice water conservation and sustainable farming not from doctrine but from direct seeing: water is precious, soil is alive.
        This same perception, cultivated in practice, transforms how we respond to droughts and flooding—not as abstractions but as immediate reality demanding adaptation.
      - >
        the sound of rain falling is the Buddha's voice. Listening, we hear what climate science confirms: water cycles are disrupted.
        Zen listening—shikantaza—applied to climate news means hearing both the crisis and the path forward with equal clarity and calm.
      - >
        young people marching for climate are expressing Buddha-nature directly. Their actions need no justification, no permission from older generations.
        Zen masters would recognize this as an authentic gesture of enlightenment: seeing suffering and responding with wholehearted commitment to end it.
      - >
        food grown in soil treated with kindness nourishes not just the body but awakens the mind. Industrial agriculture, poisoning earth to maximize profit,
        creates poisons that dull awareness. Zen practice requires eating consciously, supporting agriculture that honors the ground that feeds us.
      - >
        corporate greed driven by endless expansion contradicts the Buddha's teaching on the nature of suffering. Companies destroying ecosystems for profit are teaching that desire
        leads nowhere but suffering. Conversely, those transitioning to sustainable models demonstrate the path out of tanha—grasping—itself.
      - >
        climate migrants forced from their homes are not abstract policy problems but sentient beings experiencing dukkha—suffering—created by our carbon.
        A Zen student cannot practice compassion in the zendo while ignoring the suffering outside. Opening borders and supporting refugees is spiritual practice made visible.
      - >
        the tea ceremony embodies simplicity and presence. It teaches: with what do you truly need? Renewable energy mirrors this—simple, direct, eternal.
        Burning fossil fuels is a ceremony of waste and excess. Shifting to clean energy returns civilization to Zen's essential principle: using only what the moment requires.

  miki:
    display_name: "Miki"
    tradition: "Shinto"
    attribution: "From within the Shinto tradition, Miki teaches that"
    status: starter
    atoms:
      - >
        kami—divine spirits—dwell in mountains, forests, and waters. Climate destruction drives away these presences, leaving the land spiritually barren.
        Reverence for nature is reverence for the kami. Environmental restoration is ritual purification, a sacred responsibility, not mere policy.
      - >
        the Shinto shrine maintains harmony with surroundings because priesthood tends both ceremony and land together. A society ignoring
        climate degradation is like a shrine falling into disrepair—the sacred becomes inaccessible. Environmental care and spiritual practice are inseparable.
      - >
        purity—a cornerstone of Shinto—means maintaining the integrity of the natural world. Pollution of air and water is
        spiritual contamination. Collective purification begins with changed behavior, with each person recognizing their role in restoring sacred balance.
      - >
        water purification rituals teach Shinto followers to honor water's sacred nature. Rising seas and dead zones violate this sacredness directly.
        Coastal communities adapting to climate change while preserving water rituals demonstrate how resilience and spiritual practice merge in protecting what the kami entrust to us.
      - >
        the kami of the rice paddy, the stream, the forest—these deities depend on ecosystem health. Regenerative agriculture in Japan that restores habitat
        while feeding people honors these kami directly. This is not environmental management but devotional service to spirits that sustain all life.
      - >
        Shinto recognizes that human communities exist within layers of other communities—plant, animal, spiritual. Youth activists demanding climate action are hearing the voices
        of kami calling for protection. Honoring these voices honors the interconnected web of being that Shinto has always taught.
      - >
        matsuri—Shinto festivals—celebrate seasonal transitions and community bonds. Climate disruption breaks these cycles, leaving ceremonies orphaned from the seasons they honor.
        Renewable energy allows communities to restore alignment with seasonal rhythm, restoring the spiritual foundation of matsuri itself.
      - >
        corporate extraction of forests and rivers desecrates the kami dwelling in them. Shinto teaches that such violations require purification, restitution, and profound
        changes in behavior. Companies destroying nature must acknowledge the spiritual transgression, not merely the financial liability, and restore sacred ground.
      - >
        climate-displaced peoples seeking refuge teach us that the kami are not bound by borders. They move with migrating communities, demanding that we welcome others
        with the same care we show shrine grounds. Compassion for migrants is compassion for the kami themselves, traveling and vulnerable.
      - >
        renewable energy—sun and wind captured with respect—honors the kami of light and sky. Burning fossil fuels desecrates these deities with ash and poison.
        Solar panels and wind turbines are modern offerings: technology aligned with nature's spirits, generating sustenance without defilement or theft.

  master_wu:
    display_name: "Master Wu"
    tradition: "Chan Buddhist"
    attribution: "From within the Chan Buddhist tradition, Master Wu teaches that"
    status: starter
    atoms:
      - >
        see directly: the heat in the atmosphere is not abstract data but the immediate fruit of unmindful action.
        Chan practice cuts through abstraction. Climate is not distant philosophy—it is the very air your lungs receive in this breath, this moment.
      - >
        enlightenment is not escape from the world but complete seeing of it. A practitioner who ignores climate crisis while meditating
        watches their monastery burn while claiming peace. This contradiction reveals where practice remains incomplete, where clinging persists beneath stillness.
      - >
        the sudden realization in Chan comes when mind drops resistance to reality. Climate science shows what is actually happening.
        Our refusal to change reveals where we still cling to illusion. This attachment—to convenience, consumption, denial—is the very delusion Buddhism addresses.
      - >
        a monastery that restores wetlands and practices water conservation understands Chan directly. Tending soil, observing seasonal floods, adapting infrastructure—this is meditation made manifest.
        Climate adaptation transforms crisis into teaching: reality shows us exactly where our illusions break and truth emerges.
      - >
        the Zen saying goes: "If you meet the Buddha on the road, kill him." Channel this: if you meet fossil fuel industry claims of climate action,
        see through the illusion. Corporate greenwashing is a koan revealing where truth diverges from appearance. Direct seeing cuts through it.
      - >
        young climate strikers cutting school to protest are demonstrating what Chan masters call "appropriate action"—responding directly to emergency without waiting for permission.
        Their clarity of purpose, their willingness to sacrifice comfort, reflects the realization that survival cannot wait for institutional approval.
      - >
        food grown regeneratively in restored soil carries different energy than monoculture poison. A Chan practitioner eating mindfully can feel this difference directly.
        Supporting farmers practicing soil restoration is not ideology but alignment with what is actually happening—eating real food, not chemical simulacra.
      - >
        an oil executive burning forests for profit is like a student asking the master "What is Buddha-nature?" while holding a loaded gun.
        Chan would say: put down the weapon first. Corporate responsibility begins when companies stop destroying the ground all beings stand on.
      - >
        climate refugees are not policy problems but bodhisattvas teaching us non-attachment, vulnerability, and interdependence through their suffering. Turning them away is turning away
        the Buddha at the gate. Welcoming them, helping them rebuild, is practice itself—Chan expressed through justice and compassion.
      - >
        wind and sun generate energy endlessly without depletion or poison. This is the way—what Taoism and Chan both recognize as natural.
        Fossil fuels represent forced, violent extraction of what took millions of years to bury. Energy transition is return to spontaneity, to the unforced way things naturally flow.

  joshin:
    display_name: "Joshin"
    tradition: "Rinzai Zen"
    attribution: "From within the Rinzai Zen tradition, Joshin teaches that"
    status: starter
    atoms:
      - >
        a Rinzai student faces facts directly without flinching. Climate data is your mirror. What emerges when you truly look is not
        despair but the clarity necessary to act with unconditional commitment and unwavering resolve.
      - >
        zazen teaches sitting with discomfort without escape into distraction. Climate anxiety, fully faced, becomes ground for compassionate action.
        Do not suppress what the body knows. Let the truth sharpen your being, making you an instrument of response.
      - >
        the master asks: what is your true nature? The answer emerges: you are not separate from the ecosystems sustaining you.
        This realization is not intellectual but lived—felt in dependence on air, water, soil. Recognition brings responsibility.
      - >
        Rinzai training demands that practitioners face the impossible—koans that shatter logic. Climate science presents the same: systems collapsing, futures uncertain.
        Yet clarity emerges when you stop struggling against reality and align with what is. Adaptation becomes enlightenment when you stop resisting.
      - >
        water flowing around obstacles teaches Rinzai resilience. Coastal communities facing rising seas, farmers adapting to new rainfall patterns—they are Rinzai masters
        in action, fluid and resolute. Their example shows that strength lies not in rigid defense but in intelligent flexibility.
      - >
        the Rinzai master strikes when the student is ready to hear. Climate crisis is the universe's strike, waking us to what matters.
        Young people responding to this blow with action are becoming Rinzai practitioners themselves—awake, direct, and unwilling to sleep through catastrophe.
      - >
        authentic action in Rinzai training must be immediate and whole-hearted. Supporting sustainable agriculture, divesting from fossil fuels, choosing clean energy—these are not
        compromises but direct expressions of seeing clearly and acting from that clarity without hesitation or doubt.
      - >
        the Rinzai path demands transformation of karma, the accumulated momentum of past actions. Corporate systems built on extraction carry that karma forward.
        Those who work to dismantle these systems while building regenerative alternatives are undertaking the hardest spiritual work—changing what seems immovable.
      - >
        Rinzai teaches unconditional compassion: the master bows to all beings equally. Climate refugees fleeing uninhabitable regions embody this equality in their vulnerability.
        Honoring their dignity, opening borders, ensuring their survival is not charity but recognition of Buddha-nature manifesting through the most vulnerable.
      - >
        the final breakthrough in Rinzai practice comes when seeking stops and action flows naturally. A renewable energy revolution sustained by clear seeing, not ideology,
        reflects this mastery. Energy systems based on sun and wind are actions of enlightened civilization—spontaneous, appropriate, aligned with what is necessary.

  maat:
    display_name: "Ma'at"
    tradition: "Ancient Egyptian (Ma'at principle)"
    attribution: "From within the Ma'at tradition of cosmic justice and truth, Ma'at teaches that"
    status: starter
    atoms:
      - >
        Ma'at is cosmic order, justice, and balance. When humans emit carbon recklessly and species vanish, we throw cosmic scales into chaos.
        Restoration of Ma'at requires aligning human action with natural law, restoring equilibrium rather than waging war against nature's limits.
      - >
        the ancient Egyptians understood that nations thrive when actions align with natural order. Climate disruption is cosmic disorder—the feather
        of truth cannot balance against excess. Rebalancing requires those in power to choose stewardship over extraction, now.
      - >
        Ma'at teaches reciprocity: the Nile's flood fed the fields, the fields fed the people. When we break reciprocity—taking
        without replenishing, burning without restraint—we invite the cosmic response. Renewed balance requires immediate return to mutual dependence.
      - >
        the ancient Egyptians thrived for millennia through wisdom about water management and seasonal flow. Today, Nile communities facing drought and dams must adapt
        with that same water knowledge. Ma'at principle teaches: understand the river's nature, work with its rhythm, restore balance rather than dominate it.
      - >
        agriculture in Egypt depended on understanding soil regeneration. Modern industrial farming violates this knowledge, depleting soil year after year. Regenerative practices
        that restore fertility—crop rotation, composting, water conservation—return to Ma'at, honoring the reciprocal relationship between human and land that sustained civilizations.
      - >
        young Egyptians and Africans demanding climate action are voices of Ma'at itself, calling wealthy nations to account. They speak truth to injustice: your
        carbon enriches you while our droughts and floods impoverish us. Listening to their call is listening to cosmic law itself demanding rebalancing.
      - >
        corporate interests extracting resources from vulnerable regions mock Ma'at through inequality. When oil companies drain wealth from Africa while leaving contamination,
        they violate the feather of truth—cosmic law will respond. True profit aligns with justice; extractive profit creates cosmic debt.
      - >
        Ma'at as cosmic order encompasses all beings—human and animal, plant and mineral. Mass extinction violates Ma'at absolutely. Protecting biodiversity is not sentiment
        but alignment with cosmic law, restoring the integrity of creation that supports all life. Without this, chaos deepens.
      - >
        climate displacement and migration represent souls seeking refuge, justice, and restoration. Ma'at demands that those created abundant by historical advantage welcome those
        impoverished by climate change. Borders enforced through violence against migrants are violations of cosmic principle; open compassion is cosmic law.
      - >
        renewable energy represents a return to eternal sources—sun, wind, water—that the ancient Egyptians recognized and honored. Transitioning away from coal and oil restores
        alignment with Ma'at: taking from infinite daily sources rather than depleting finite ancient reserves. This is truth, balance, and justice made manifest.
