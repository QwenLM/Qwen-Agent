# Pearl News — teacher roster for news articles.
# Maps each teacher to their tradition (for attribution) and Pearl News news topics.
# Used by teacher_resolver.py to pick a named teacher per article.
# Policy: One named teacher per article; attributed by name + tradition.
# Spec ref: PEARL_NEWS_WRITER_SPEC.md §6 (commentary exception applies to all templates when teacher atoms present).

schema_version: 1

# Language/region fit per teacher (helps match language-specific articles)
# Japan-fit teachers: Junko, Miki, Joshin (Japanese traditions)
# China-fit teachers: Master Feung, Master Wu (Chinese traditions)
# English-fit teachers: Ahjan, Sai Maa, Ra, Pamela Fellows, Maat (wide international reach)

teachers:
